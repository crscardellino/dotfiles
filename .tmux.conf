set -g default-terminal    "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set-option -sg escape-time 10

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Session loader example
# bind T source "$HOME/.tmux/session1"

# Enable automatic window/pane titling to prevent empty column collapses
set -g set-titles on
set -g set-titles-string "#W"

# Disable repeat-time
set-option -g repeat-time 0

# Mouse scrolling with longer history-limit
set -g mouse on
set -g history-limit 100000

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# TMUX resurrect key bindings
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# Pre-restore hook: Capture the active session name, switch client, and kill the original session
set -g @resurrect-hook-pre-restore-pane-processes 'SESSION=$(tmux display-message -p "#S"); tmux switch-client -n; tmux kill-session -t "$SESSION"'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'

